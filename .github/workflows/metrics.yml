name: Metrics

on:
  schedule:
    - cron: "0 0 * * *" # updates once a day
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          template: classic

          # Sections shown
          base: header, activity

          # Short intro block (bio, account age, etc.)
          plugin_introduction: yes

          # Isometric commit calendar - looks good even with low activity
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Language breakdown, including recent activity
          plugin_languages: yes
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 30
          plugin_languages_threshold: 0%

          # Achievement badges based on account activity
          plugin_achievements: yes
          plugin_achievements_threshold: C

          # Coding habit charts (active hours, days, etc.)
          plugin_habits: yes
          plugin_habits_days: 30
          plugin_habits_charts: yes
